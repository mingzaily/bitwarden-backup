version: '3.8'

services:
  bitwarden-backup:
    build: .
    container_name: bitwarden-backup
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    environment:
      - SERVER_PORT=8080
      - DB_PATH=/app/data/bitwarden-backup.db
      - LOG_LEVEL=info
    restart: unless-stopped
